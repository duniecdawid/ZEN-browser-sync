name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Archive
        run: |
          xcodebuild \
            -scheme ZenSync \
            -configuration Release \
            -archivePath build/ZenSync.xcarchive \
            archive

      - name: Zip
        run: cd build/ZenSync.xcarchive/Products/Applications && zip -r ../../../../ZenSync.zip ZenSync.app

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ZenSync.zip
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
